<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshFeast</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

/* ===== COLORS ===== */
:root {
    --primary: #F97316;
    --accent: #4A9964;
    --background: #FDFBF8;
    --foreground: #271D14;
    --secondary: #ECF5EE;
    --border: #E6E0D9;
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: var(--background);
    color: var(--foreground);
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 60px;
    background: white;
    border-bottom: 1px solid var(--border);
    position: relative;
}

/* LOGO (FROM YOUR CODE) */
.logo {
    display: flex;
    align-items: center;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
}

.logo-circle {
    width: 38px;
    height: 38px;
    background: var(--primary);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 10px;
}

.highlight {
    color: var(--primary);
}

/* NAV LINKS */
.nav-links {
    list-style: none;
    display: flex;
    gap: 20px;
}

.nav-links a {
    text-decoration: none;
    color: var(--foreground);
    padding: 8px 18px;
    border-radius: 25px;
    transition: 0.3s;
}

.nav-links a:hover {
    background: var(--secondary);
    color: var(--accent);
}

.nav-links a.active {
    background: var(--primary);
    color: white;
}

/* ICONS */
.nav-icons {
    display: flex;
    align-items: center;
    gap: 20px;
}

.icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 18px;
    padding: 8px;
    border-radius: 50%;
    transition: 0.3s;
}

.icon-btn:hover {
    background: var(--secondary);
    color: var(--primary);
}

/* CART */
.cart {
    position: relative;
}

.cart-count {
    position: absolute;
    top: -6px;
    right: -8px;
    background: var(--primary);
    color: white;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 50%;
}

/* HAMBURGER */
.menu-toggle {
    display: none;
    font-size: 22px;
    cursor: pointer;
}

/* PAGES */
.page {
    display: none;
    padding: 100px 20px;
    text-align: center;
    font-size: 30px;
}

.active-page {
    display: block;
}

/* MOBILE */
@media(max-width:768px){

.navbar {
    padding: 15px 20px;
}

.menu-toggle {
    display: block;
}

.nav-links {
    position: absolute;
    top: 65px;
    left: 0;
    width: 100%;
    background: white;
    flex-direction: column;
    display: none;
    border-top: 1px solid var(--border);
}

.nav-links li {
    text-align: center;
    padding: 12px 0;
}

.nav-links.show {
    display: flex;
}

}

</style>
</head>
<body>

<nav class="navbar">

<!-- LOGO -->
<div class="logo" data-page="home">
<div class="logo-circle">F</div>
<span>Fresh<span class="highlight">Feast</span></span>
</div>

<!-- HAMBURGER -->
<div class="menu-toggle" id="menuBtn">
<i class="fas fa-bars"></i>
</div>

<!-- LINKS -->
<ul class="nav-links" id="navLinks">
<li><a class="nav-link active" data-page="home">Home</a></li>
<li><a class="nav-link" data-page="menu">Menu</a></li>
<li><a class="nav-link" data-page="preferences">Preferences</a></li>
<li><a class="nav-link" data-page="support">Support</a></li>
</ul>

<!-- ICONS -->
<div class="nav-icons">

<button class="icon-btn icon-link" data-page="location">
<i class="fas fa-map-marker-alt"></i>
</button>

<button class="icon-btn icon-link" data-page="account">
<i class="fas fa-user"></i>
</button>

<div class="cart">
<button class="icon-btn icon-link" data-page="cart">
<i class="fas fa-shopping-cart"></i>
</button>
<span class="cart-count">3</span>
</div>

</div>

</nav>

<!-- PAGES -->
<section id="home" class="page active-page">🏠 Home Page</section>
<section id="menu" class="page">🍽️ Menu Page</section>
<section id="preferences" class="page">⚙️ Preferences Page</section>
<section id="support" class="page">📞 Support Page</section>
<section id="location" class="page">📍 Location Page</section>
<section id="account" class="page">👤 Account Page</section>
<section id="cart" class="page">🛒 Cart Page</section>

<script>

const buttons = document.querySelectorAll(".nav-link, .icon-link, .logo");
const pages = document.querySelectorAll(".page");

buttons.forEach(btn => {
btn.addEventListener("click", function(){

document.querySelectorAll(".nav-link").forEach(link=>{
link.classList.remove("active");
});

if(this.classList.contains("nav-link")){
this.classList.add("active");
}

pages.forEach(p=>p.classList.remove("active-page"));

let pageId = this.getAttribute("data-page") || "home";
document.getElementById(pageId).classList.add("active-page");

if(window.innerWidth <= 768){
document.getElementById("navLinks").classList.remove("show");
}

});
});

document.getElementById("menuBtn").addEventListener("click",()=>{
document.getElementById("navLinks").classList.toggle("show");
});

</script>

</body>
</html>
